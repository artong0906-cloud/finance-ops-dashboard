<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/dashboard">
  <title>실데이터 대시보드로 이동</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    }
    main {
      width: min(520px, calc(100vw - 40px));
      border: 1px solid #d8e0ea;
      border-radius: 12px;
      background: #fff;
      padding: 28px;
      box-shadow: 0 8px 28px rgba(20, 28, 45, .08);
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 20px; color: #667085; line-height: 1.7; }
    a {
      display: inline-flex;
      border-radius: 10px;
      background: #1d4ed8;
      color: #fff;
      padding: 10px 14px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>실데이터 대시보드로 이동합니다</h1>
    <p>기존 프로토타입 샘플 데이터는 현재 업로드 데이터와 혼동될 수 있어, 2026년 5월 실데이터 화면으로 연결합니다.</p>
    <a href="/dashboard">대시보드 열기</a>
  </main>
</body>
</html>
