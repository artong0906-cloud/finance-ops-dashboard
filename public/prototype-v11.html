 const relatedAssets=monthTx().filter(t=>t.assetType===selectedAssetType||t.main==='자산'&&selectedAssetType==='유/무형자산'||selectedAssetType==='현금성자산'&&t.source==='은행');
 const relatedLiabs=monthTx().filter(t=>t.liabilityType===selectedLiabilityType||selectedLiabilityType==='기타부채'&&(t.main==='광고비'||t.main==='급여'||t.source==='카드'));
 const assetCards=assets.map((a,i)=>{const ending=calcEnding(a); const net=(a.increase||0)-(a.decrease||0); return `<div class="card clickable ${selectedAssetType===a.type?'balance-highlight':''}" onclick="selectAsset('${a.type}')"><div class="label">${a.type}</div><div class="value">${fmt(ending)}</div><div class="delta ${deltaClass(net)}">순증감 ${signed(net)}</div><div class="mini">${a.name} · 증가 ${fmt(a.increase||0)} / 감소 ${fmt(a.decrease||0)}</div></div>`}).join('');
 const liabilityCards=liabilities.map((l,i)=>{const ending=calcEnding(l); const net=(l.increase||0)-(l.decrease||0); return `<div class="card clickable ${selectedLiabilityType===l.type?'balance-highlight':''}" onclick="selectLiability('${l.type}')"><div class="label">${l.type}</div><div class="value">${fmt(ending)}</div><div class="delta ${deltaClass(net)}">순증감 ${signed(net)}</div><div class="mini">${l.name} · 증가 ${fmt(l.increase||0)} / 감소 ${fmt(l.decrease||0)}</div></div>`}).join('');
 document.getElementById('balance').innerHTML=header('자산·자본·부채 현황','기초값은 유지하고 당월 증가·감소만 입력하면 기말과 자본이 자동 계산됩니다.')+`
 <div class="card"><div class="section-title" style="margin-top:0"><h2>자본 계산 구조</h2><span class="hint">자산 - 부채 = 자본</span></div><div class="bridge"><div class="bridge-box"><span>총자산</span><b>${fmt(assetTotal)}</b><small>기초 ${fmt(assetBegin)} / 증가 ${fmt(assetIncrease)} / 감소 ${fmt(assetDecrease)}</small></div><div class="bridge-op">-</div><div class="bridge-box"><span>총부채</span><b>${fmt(liabilityTotal)}</b><small>기초 ${fmt(liabBegin)} / 증가 ${fmt(liabilityIncrease)} / 감소 ${fmt(liabilityDecrease)}</small></div><div class="bridge-op">=</div><div class="bridge-box primary"><span>자본</span><b>${fmt(equity)}</b><small>전월 대비 ${signed(equity-equityBegin)}</small></div></div></div>
 <div class="section-title"><h2>자산 요약</h2><span class="hint">카드를 클릭하면 하단에 해당 자산 세부 거래가 표시됩니다.</span></div><div class="grid kpi4">${assetCards}</div>
 <div class="section-title"><h2>부채 요약</h2><span class="hint">카드를 클릭하면 하단에 해당 부채 세부 거래가 표시됩니다.</span></div><div class="grid kpi4">${liabilityCards}</div>
 <div class="grid two" style="margin-top:14px"><div class="card"><div class="section-title" style="margin-top:0"><h2>자산 증감 입력표</h2><span class="hint">기말 = 기초 + 증가 - 감소</span></div><table><thead><tr><th>구분</th><th>자산명</th><th class="num">기초</th><th class="num">증가</th><th class="num">감소</th><th class="num">기말</th></tr></thead><tbody>${assets.map((item,i)=>`<tr class="click-row ${selectedAssetType===item.type?'selected':''}" onclick="selectAsset('${item.type}')"><td><span class="tag asset">${item.type}</span></td><td><b>${item.name}</b><div class="mini">${item.detail||''}</div></td><td class="num"><input class="num-input" type="number" value="${item.beginning||0}" onclick="event.stopPropagation()" onchange="updateBalance('asset',${i},'beginning',this.value)"></td><td class="num"><input class="num-input" type="number" value="${item.increase||0}" onclick="event.stopPropagation()" onchange="updateBalance('asset',${i},'increase',this.value)"></td><td class="num"><input class="num-input" type="number" value="${item.decrease||0}" onclick="event.stopPropagation()" onchange="updateBalance('asset',${i},'decrease',this.value)"></td><td class="num strong-num">${fmt(calcEnding(item))}</td></tr>`).join('')}</tbody></table></div>
 <div class="card"><div class="section-title" style="margin-top:0"><h2>부채 증감 입력표</h2><span class="hint">기말 = 기초 + 증가 - 감소</span></div><table><thead><tr><th>구분</th><th>항목</th><th class="num">기초</th><th class="num">증가</th><th class="num">감소</th><th class="num">기말</th></tr></thead><tbody>${liabilities.map((item,i)=>`<tr class="click-row ${selectedLiabilityType===item.type?'selected':''}" onclick="selectLiability('${item.type}')"><td><span class="tag warn">${item.type}</span></td><td><b>${item.name}</b><div class="mini">${item.due||''}</div></td><td class="num"><input class="num-input" type="number" value="${item.beginning||0}" onclick="event.stopPropagation()" onchange="updateBalance('liability',${i},'beginning',this.value)"></td><td class="num"><input class="num-input" type="number" value="${item.increase||0}" onclick="event.stopPropagation()" onchange="updateBalance('liability',${i},'increase',this.value)"></td><td class="num"><input class="num-input" type="number" value="${item.decrease||0}" onclick="event.stopPropagation()" onchange="updateBalance('liability',${i},'decrease',this.value)"></td><td class="num strong-num">${fmt(calcEnding(item))}</td></tr>`).join('')}</tbody></table></div></div>
 <div class="card" style="margin-top:14px"><div class="section-title" style="margin-top:0"><h2>선택 항목 세부내역</h2><span class="hint">자산: ${selectedAssetType} / 부채: ${selectedLiabilityType}</span></div><div class="grid two"><div><h3 style="margin:0 0 10px;font-size:15px">${selectedAssetType} 관련 거래</h3>${relatedAssets.length?expenseTable(relatedAssets):'<div class="detail-panel">관련 거래가 없습니다. 실제 연동 시 자산마스터와 파로스 전표 기준으로 표시됩니다.</div>'}</div><div><h3 style="margin:0 0 10px;font-size:15px">${selectedLiabilityType} 관련 거래</h3>${relatedLiabs.length?expenseTable(relatedLiabs):'<div class="detail-panel">관련 거래가 없습니다. 실제 연동 시 부채마스터와 파로스 전표 기준으로 표시됩니다.</div>'}</div></div></div>`;
}
function renderBalance(){const assetTotal=totalBalance(assets,'ending'); const liabilityTotal=totalBalance(liabilities,'ending'); const equity=assetTotal-liabilityTotal; const assetBegin=totalBalance(assets,'beginning'); const liabBegin=totalBalance(liabilities,'beginning'); const equityBegin=assetBegin-liabBegin; const assetIncrease=totalBalance(assets,'increase'); const assetDecrease=totalBalance(assets,'decrease'); const liabilityIncrease=totalBalance(liabilities,'increase'); const liabilityDecrease=totalBalance(liabilities,'decrease'); const relatedAssets=monthTx().filter(t=>t.assetType===selectedAssetType||t.main==='자산'&&selectedAssetType==='유/무형자산'||selectedAssetType==='현금성자산'&&t.source==='은행'); const relatedLiabs=monthTx().filter(t=>t.liabilityType===selectedLiabilityType||selectedLiabilityType==='기타부채'&&(t.main==='광고비'||t.main==='급여'||t.source==='카드'));
 document.getElementById('balance').innerHTML=header('자산·자본·부채 현황','기초값과 당월 증감분을 분리해서 입력하고, 기말과 자본을 자동 계산합니다.')+`
 <div class="grid kpi4">${kpi('총자산',assetTotal,assetTotal-assetBegin)}${kpi('총부채',liabilityTotal,liabilityTotal-liabBegin)}${kpi('자본',equity,equity-equityBegin)}${kpiText('자본 증감률',pct((equity-equityBegin)/(equityBegin||1)),`전월 자본 대비 ${pct((equity-equityBegin)/(equityBegin||1))}`,deltaClass(equity-equityBegin))}</div>
 <div class="card" style="margin-top:14px"><div class="section-title" style="margin-top:0"><h2>자본 계산 브릿지</h2><span class="hint">자본 = 총자산 - 총부채</span></div><div class="bridge"><div class="bridge-box"><span>총자산</span><b>${fmt(assetTotal)}</b><small>기초 ${fmt(assetBegin)} / 순증감 ${signed(assetTotal-assetBegin)}</small></div><div class="bridge-op">-</div><div class="bridge-box"><span>총부채</span><b>${fmt(liabilityTotal)}</b><small>기초 ${fmt(liabBegin)} / 순증감 ${signed(liabilityTotal-liabBegin)}</small></div><div class="bridge-op">=</div><div class="bridge-box primary"><span>자본</span><b>${fmt(equity)}</b><small>전월 대비 ${signed(equity-equityBegin)}</small></div></div><div class="calc-note" style="margin-top:12px">매월 전체 잔액을 다시 쓰지 않고, <b>기초잔액</b>은 유지한 뒤 <b>증가 입력</b>과 <b>감소 입력</b>만 입력하는 구조입니다. 기말은 자동 계산됩니다.</div></div>
 <div class="card" style="margin-top:14px"><div class="section-title" style="margin-top:0"><h2>자산 입력·상세</h2><span class="hint">자산 항목 클릭 시 하단 세부내역 표시</span></div><table><thead><tr><th>자산구분</th><th>자산명</th><th class="num">기초</th><th class="num">증가 입력</th><th class="num">감소 입력</th><th class="num">순증감</th><th class="num">기말 자동</th></tr></thead><tbody>${renderBalanceInputRows(assets,'asset')}</tbody><tfoot><tr><th colspan="2">자산 합계</th><th class="num">${fmt(assetBegin)}</th><th class="num">${fmt(assetIncrease)}</th><th class="num">${fmt(assetDecrease)}</th><th class="num ${deltaClass(assetTotal-assetBegin)}">${signed(assetTotal-assetBegin)}</th><th class="num">${fmt(assetTotal)}</th></tr></tfoot></table></div>
 <div class="card" style="margin-top:14px"><div class="section-title" style="margin-top:0"><h2>부채 입력·상세</h2><span class="hint">부채 항목 클릭 시 하단 세부내역 표시</span></div><table><thead><tr><th>부채구분</th><th>항목</th><th class="num">기초</th><th class="num">증가 입력</th><th class="num">감소 입력</th><th class="num">순증감</th><th class="num">기말 자동</th></tr></thead><tbody>${renderBalanceInputRows(liabilities,'liability')}</tbody><tfoot><tr><th colspan="2">부채 합계</th><th class="num">${fmt(liabBegin)}</th><th class="num">${fmt(liabilityIncrease)}</th><th class="num">${fmt(liabilityDecrease)}</th><th class="num ${deltaClass(liabilityTotal-liabBegin)}">${signed(liabilityTotal-liabBegin)}</th><th class="num">${fmt(liabilityTotal)}</th></tr></tfoot></table></div>
 <div class="card" style="margin-top:14px"><div class="section-title" style="margin-top:0"><h2>선택 항목 세부내역</h2><span class="hint">자산: ${selectedAssetType} / 부채: ${selectedLiabilityType}</span></div><div class="split"><div><h3 style="margin:0 0 10px;font-size:15px">${selectedAssetType} 관련 거래</h3>${relatedAssets.length?expenseTable(relatedAssets):'<div class="detail-panel">관련 거래가 없습니다. 실제 연동 시 자산마스터와 파로스 전표 기준으로 표시됩니다.</div>'}</div><div><h3 style="margin:0 0 10px;font-size:15px">${selectedLiabilityType} 관련 거래</h3>${relatedLiabs.length?expenseTable(relatedLiabs):'<div class="detail-panel">관련 거래가 없습니다. 실제 연동 시 부채마스터와 파로스 전표 기준으로 표시됩니다.</div>'}</div></div></div>`;}
function setMonth(v){currentMonth=v; renderAll()} function selectBankAccount(id){selectedBankAccountId=id; renderBank()} function setCardBudget(v){cardBudgetFilter=v; renderCard()} function setExpense(k,v){expenseFilters[k]=v; renderExpense()} function drillTalent(talent){expenseFilters.talent=talent; expenseFilters.main='전체'; renderExpense(); setTimeout(()=>document.getElementById('expenseDetailTop')?.scrollIntoView({behavior:'smooth',block:'start'}),0)} function goExpense(unit,cash,talent='전체'){expenseFilters.businessUnit=unit; expenseFilters.cashCard=cash; expenseFilters.talent=talent; document.querySelector('[data-page="expense"]').click(); renderExpense()} function selectAsset(v){selectedAssetType=v; renderBalance()} function selectLiability(v){selectedLiabilityType=v; renderBalance()}
function renderAll(){renderMain();renderBank();renderCard();renderExpense();renderBalance()}
document.getElementById('nav').addEventListener('click',e=>{if(e.target.tagName!=='BUTTON')return;document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(e.target.dataset.page).classList.add('active')});
renderAll();

</script>
